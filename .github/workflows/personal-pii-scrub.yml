name: personal-pii-scrub
# Auto-managed by ~/.local/bin/gh-harden-repos.sh (Layer 8). Hand-edits
# to this file survive only until the next daily run UNLESS
# the template in `⚙️ Meta/scripts/gh-harden-repos.sh` is updated to match.
# Repo-specific carve-outs for ai-brain-starter live below in the pathspec
# excludes (`.claude-plugin/*.json`) and the pattern list (no "High-Rise"
# because the framework is deliberately public per CLAUDE.md license-hygiene
# carve-out — ai-brain-starter IS the public substrate that teaches it).
#
# Blocks PRs / pushes that leak vault paths or personal-name tokens into
# public-repo source. Word-boundary regex per ~/.claude/CLAUDE.md global
# personal-data scrub rule. Public repos only (private repos skip this).
#
# Reimplemented from BuilderIO/agent-native scripts/guard-* CI guard
# pattern (cherry-pick A, codified 2026-05-19). The session-level
# PreToolUse hooks in ~/.claude/hooks/ catch this at write-time during
# Claude Code sessions; this workflow catches it for ANY commit path
# (gh CLI, direct git, contractor co-author, future agent).
#
# Patterns kept in lockstep with CLAUDE.md "Personal-data scrub" section.
# Adding/removing patterns: edit ~/.claude/CLAUDE.md AND this template
# (in ⚙️ Meta/scripts/gh-harden-repos.sh) in the same commit, then let
# the daily run propagate.

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 12 * * 1'   # Mondays 12:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
      - name: Personal-name + vault-path scrub (source files)
        run: |
          set -e
          # Word-boundary patterns from ~/.claude/CLAUDE.md. NOT case-
          # insensitive: 'wOnder' (34-floor framework #32) contains 'Onde'
          # but \bOnde\b skips it (CLAUDE.md false-positive trap).
          # If you edit this array, also edit the IDENTICAL array in the
          # next step ("...bundled .mcpb / .zip archives") — both scrubs
          # must stay in lockstep.
          # ai-brain-starter carve-out: bare "High-Rise" removed from
          # this repo's pattern list because the framework is deliberately
          # public per CLAUDE.md license-hygiene rule (the substrate
          # teaches the 34-floor framework). The two book-title phrases
          # below stay scrubbed; first letters use a one-char regex class
          # so this workflow's own source does not trip the PR-scoped
          # private-context scan in lint.yml (same self-exclusion trick
          # that lint.yml uses on its own pattern strings).
          PATTERNS=(
            '\bAdelaida\b'
            '\bDiaz-Roa\b'
            '\bSergio Perez\b'
            '\bSneider Alfonso\b'
            '\bAccenture\b'
            '\bCentre415\b'
            '\bvinitos\b'
            '/Users/adelaidadiaz-roa/'
            'Desktop/Adelaida Notes'
            'adelaida@'
            'tech@onde'
            'After the Shock'
            '[M]oving Through the [H]igh-Rise'
            '[T]he [H]igh-Rise [S]eries'
          )
          fail=0
          # Scan source files. Exclude markdown docs (README, CHANGELOG,
          # docs/), vendored deps, lock files, and the workflows themselves
          # (this file MENTIONS the patterns by definition). Also exclude
          # .claude-plugin/*.json (plugin maintainer metadata — same shape
          # as LICENSE / AUTHORS, intentionally names the author).
          for p in "${PATTERNS[@]}"; do
            matches=$(git grep -nE "$p" \
              -- ':!README*' ':!CHANGELOG*' ':!docs/' ':!*.md' \
              ':!LICENSE*' ':!COPYING*' ':!NOTICE*' \
              ':!AUTHORS*' ':!MAINTAINERS*' \
              ':!*pyproject.toml' ':!*setup.py' ':!*setup.cfg' \
              ':!*package.json' ':!*Cargo.toml' ':!*manifest.json' \
              ':!.claude-plugin/marketplace.json' ':!.claude-plugin/plugin.json' \
              ':!.env.example' ':!*.env.example' \
              ':!tests/integration/test_smoke.py' \
              ':!vendor/' ':!node_modules/' ':!*.lock' \
              ':!package-lock.json' ':!pnpm-lock.yaml' \
              ':!.github/workflows/personal-pii-scrub.yml' 2>/dev/null || true)
            if [ -n "$matches" ]; then
              echo "::error::personal-data pattern leaked into source: $p"
              echo "$matches"
              fail=1
            fi
          done
          if [ $fail -eq 1 ]; then
            echo "::error::Personal-data scrub failed (source files). See CLAUDE.md 'Personal-data scrub' section + repo-evaluation.md cherry-pick A."
            exit 1
          fi
          echo "Source-file scrub clean."
      - name: Personal-name + vault-path scrub (bundled .mcpb / .zip archives)
        # .mcpb is just .zip with a different extension; both unzip the
        # same way. Closes bug class PERSONAL-DATA-IN-BUNDLED-ARCHIVE-
        # UNCAUGHT (concretely: substack-mcp v0.1.0 .mcpb leaked
        # .claude/settings.local.json with vault paths; v0.2.0 was rebuilt
        # clean, but until this step landed the workflow couldn't catch
        # the next regression).
        run: |
          set -e
          ARCHIVES=$(git ls-files '*.mcpb' '*.zip' 2>/dev/null || true)
          if [ -z "$ARCHIVES" ]; then
            echo "No tracked .mcpb / .zip archives. Skipping archive scan."
            exit 0
          fi
          # IDENTICAL pattern list to the source-files step above. Keep
          # them in lockstep — if you edit one, edit the other.
          # ai-brain-starter carve-out applied here too (see source-files
          # step rationale). First-letter char class on the two book-title
          # phrases preserves the regex semantics while preventing this
          # workflow's source from tripping lint.yml's private-context scan.
          PATTERNS=(
            '\bAdelaida\b'
            '\bDiaz-Roa\b'
            '\bSergio Perez\b'
            '\bSneider Alfonso\b'
            '\bAccenture\b'
            '\bCentre415\b'
            '\bvinitos\b'
            '/Users/adelaidadiaz-roa/'
            'Desktop/Adelaida Notes'
            'adelaida@'
            'tech@onde'
            'After the Shock'
            '[M]oving Through the [H]igh-Rise'
            '[T]he [H]igh-Rise [S]eries'
          )
          fail=0
          while IFS= read -r archive; do
            [ -z "$archive" ] && continue
            echo "Scanning archive: $archive"
            tmp=$(mktemp -d)
            if ! unzip -q -o "$archive" -d "$tmp" 2>/dev/null; then
              echo "::error::failed to unzip $archive — treating as scrub failure"
              fail=1
              rm -rf "$tmp"
              continue
            fi
            # Same exclusions as the source-file step (LICENSE/COPYING/
            # NOTICE legitimately attribute the author; README/CHANGELOG/
            # *.md are docs; vendored deps + lock files don't count).
            # -a forces grep to treat binary-detected files as text so
            # extracted scripts with non-UTF8 bytes still get scanned.
            for p in "${PATTERNS[@]}"; do
              matches=$(grep -rnaE \
                --exclude='README*' --exclude='CHANGELOG*' --exclude='*.md' \
                --exclude='LICENSE*' --exclude='COPYING*' --exclude='NOTICE*' \
                --exclude='AUTHORS*' --exclude='MAINTAINERS*' \
                --exclude='pyproject.toml' --exclude='setup.py' \
                --exclude='setup.cfg' --exclude='package.json' \
                --exclude='Cargo.toml' --exclude='manifest.json' \
                --exclude='marketplace.json' --exclude='plugin.json' \
                --exclude='.env.example' \
                --exclude='test_smoke.py' \
                --exclude='*.lock' --exclude='package-lock.json' \
                --exclude='pnpm-lock.yaml' \
                --exclude-dir='vendor' --exclude-dir='node_modules' \
                --exclude-dir='docs' \
                "$p" "$tmp" 2>/dev/null || true)
              if [ -n "$matches" ]; then
                echo "::error::personal-data pattern leaked into $archive: $p"
                echo "$matches" | sed "s|^$tmp/|$archive::|"
                fail=1
              fi
            done
            rm -rf "$tmp"
          done <<< "$ARCHIVES"
          if [ $fail -eq 1 ]; then
            echo "::error::Archive scrub failed. .mcpb / .zip bundle contained personal-data patterns. See CLAUDE.md 'Personal-data scrub' section."
            exit 1
          fi
          echo "Archive scrub clean."