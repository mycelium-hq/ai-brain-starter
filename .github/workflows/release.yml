name: release

# Builds a clean ai-brain-starter.zip + tar.gz release artifact when a v* tag is pushed.
# The zip is consumable via Claude Code 2.1.129+'s `--plugin-url` flag:
#   claude --plugin-url https://github.com/adelaidasofia/ai-brain-starter/releases/latest/download/ai-brain-starter.zip
#
# Triggers:
#   - tag push matching v*
#   - manual workflow_dispatch (specify an existing tag)
#
# Guards before upload:
#   - validates .claude-plugin/plugin.json + marketplace.json parse as JSON
#   - excludes secrets, local settings, build artifacts from the archive
#
# Note on private-context scanning: that lives in lint.yml as a PR-diff-scoped job,
# not in this release workflow. By the time a tag is pushed, every commit on main
# has already passed lint.yml on its PR. Re-scanning the full tree at release time
# would false-positive on legitimate framework references (the High-Rise floor
# framework appears throughout the repo as the journaling system itself).

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build release for (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: checkout (tag or workflow_dispatch input)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: validate plugin manifest
        run: |
          set -e
          test -f .claude-plugin/plugin.json || { echo "::error::missing .claude-plugin/plugin.json"; exit 1; }
          test -f .claude-plugin/marketplace.json || { echo "::error::missing .claude-plugin/marketplace.json"; exit 1; }
          python3 -c "import json; json.load(open('.claude-plugin/plugin.json'))"
          python3 -c "import json; json.load(open('.claude-plugin/marketplace.json'))"

      - name: build release archives
        id: build
        # Defense-in-depth: bind workflow_dispatch input to an env var per the
        # workflow-injection guide (https://github.blog/security/vulnerability-research/...)
        # rather than interpolating ${{ github.event.inputs.tag }} directly into the run: shell.
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -e
          TAG="${GITHUB_REF#refs/tags/}"
          if [ -z "$TAG" ] || [ "$TAG" = "$GITHUB_REF" ]; then
            TAG="$INPUT_TAG"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::No tag resolved"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Stage to /tmp to avoid recursive-include and zip-of-self issues.
          STAGE="/tmp/ai-brain-starter"
          rm -rf "$STAGE" && mkdir -p "$STAGE"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='.venv' \
            --exclude='*.bak' \
            --exclude='*.bak-*' \
            --exclude='.DS_Store' \
            --exclude='.env' \
            --exclude='.env.*' \
            --include='.env.example' \
            --exclude='*.key' \
            --exclude='*.pem' \
            --exclude='*.pfx' \
            --exclude='*.p12' \
            --exclude='secrets.json' \
            --exclude='.zsh_secrets' \
            --exclude='.claude/settings.local.json' \
            --exclude='.promote-state.json' \
            --exclude='.driftignore' \
            ./ "$STAGE/"

          # Zip
          (cd /tmp && zip -rq ai-brain-starter.zip ai-brain-starter)
          mv /tmp/ai-brain-starter.zip ./ai-brain-starter.zip
          sha256sum ai-brain-starter.zip > ai-brain-starter.zip.sha256

          # Tarball (cross-platform alt)
          (cd /tmp && tar czf ai-brain-starter.tar.gz ai-brain-starter)
          mv /tmp/ai-brain-starter.tar.gz ./ai-brain-starter.tar.gz
          sha256sum ai-brain-starter.tar.gz > ai-brain-starter.tar.gz.sha256

          ls -la ai-brain-starter.zip ai-brain-starter.tar.gz *.sha256

      - name: smoke-test built archives
        # Catches a class of bugs the at-build manifest validation doesn't:
        #   - rsync exclusion accidentally drops .claude-plugin/ from the zip
        #   - directory structure inside the zip is wrong (root != ai-brain-starter/)
        #   - manifest is parseable in source but corrupted in archive (encoding,
        #     line-ending, BOM issues)
        # Unpacks each archive to a temp dir and asserts the unpacked plugin
        # manifest still parses + has required name + version fields.
        run: |
          set -e
          TMP=/tmp/smoke
          rm -rf "$TMP" && mkdir -p "$TMP"

          # zip
          unzip -q ai-brain-starter.zip -d "$TMP/from-zip"
          test -f "$TMP/from-zip/ai-brain-starter/.claude-plugin/plugin.json" || { echo "::error::zip missing .claude-plugin/plugin.json at expected path"; exit 1; }
          python3 -c "
          import json
          d = json.load(open('$TMP/from-zip/ai-brain-starter/.claude-plugin/plugin.json'))
          assert d.get('name') == 'ai-brain-starter', f'bad name: {d.get(\"name\")}'
          assert d.get('version'), 'missing version'
          print(f'zip OK: name={d[\"name\"]} version={d[\"version\"]}')
          "

          # tar.gz
          mkdir -p "$TMP/from-tar"
          tar xzf ai-brain-starter.tar.gz -C "$TMP/from-tar"
          test -f "$TMP/from-tar/ai-brain-starter/.claude-plugin/plugin.json" || { echo "::error::tar.gz missing .claude-plugin/plugin.json at expected path"; exit 1; }
          python3 -c "
          import json
          d = json.load(open('$TMP/from-tar/ai-brain-starter/.claude-plugin/plugin.json'))
          assert d.get('name') == 'ai-brain-starter', f'bad name: {d.get(\"name\")}'
          assert d.get('version'), 'missing version'
          print(f'tar.gz OK: name={d[\"name\"]} version={d[\"version\"]}')
          "

          # SHA256 verification: re-hash and compare to .sha256 sidecar
          for f in ai-brain-starter.zip ai-brain-starter.tar.gz; do
            actual=$(sha256sum "$f" | awk '{print $1}')
            expected=$(awk '{print $1}' "$f.sha256")
            if [ "$actual" != "$expected" ]; then
              echo "::error::$f sha256 mismatch (sidecar=$expected actual=$actual)"
              exit 1
            fi
            echo "$f sha256 OK ($actual)"
          done

          echo "All smoke-tests passed."

      - name: create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.build.outputs.tag }}
        run: |
          set -e
          # If release already exists (re-run via workflow_dispatch), upload assets to it.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists, uploading assets with --clobber."
            gh release upload "$TAG" \
              ai-brain-starter.zip \
              ai-brain-starter.zip.sha256 \
              ai-brain-starter.tar.gz \
              ai-brain-starter.tar.gz.sha256 \
              --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              ai-brain-starter.zip \
              ai-brain-starter.zip.sha256 \
              ai-brain-starter.tar.gz \
              ai-brain-starter.tar.gz.sha256
          fi
