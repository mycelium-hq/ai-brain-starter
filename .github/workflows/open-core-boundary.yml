name: open-core-boundary
#
# Fails any PR/push that adds paid-runtime content (per-vertical packs, multi-tenant
# connectors, audit analytics) to the public substrate. Enforces docs/adr/0001.
#
# Repo-native guard (NOT auto-managed by gh-harden-repos.sh). The logic lives in
# scripts/check-open-core-boundary.sh so the identical check runs locally pre-push.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # A superseded push to the same PR cancels the in-flight run instead of
  # billing it to completion. Scoped to pull_request ONLY: push / schedule runs
  # are never cancelled (and if a merge queue is ever wired here, cancelling a
  # queued group would deadlock it). Added by MYC-3180 after ci-cost-audit.py
  # flagged this workflow as billing every superseded push in full.
  group: open-core-boundary-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Check open-core boundary (ADR-0001)
        run: bash scripts/check-open-core-boundary.sh
